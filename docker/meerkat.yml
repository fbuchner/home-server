name: meerkat-crm

services:
  backend:
    image: ghcr.io/fbuchner/meerkat-crm-backend:latest
    container_name: meerkat-backend
    restart: unless-stopped
    environment:
      - SQLITE_DB_PATH=/app/data/meerkat.db
      - PROFILE_PHOTO_DIR=/app/static/photos
      - HOST_PORT=8080
      - JWT_SECRET_KEY=XXXXXXXXXXXXXXXXXXX
      - JWT_EXPIRY_HOURS=730
      - RESEND_API_KEY=XXXXXXXXXXXXXXXXXXX
      - RESEND_FROM_EMAIL=mail@example.com
      - REMINDER_TIME=06:00
      - FRONTEND_URL=http://url.com:7300
      - LOG_LEVEL=info
      - LOG_PRETTY=false
      - FRONTEND_PORT=7300
      - CARDDAV_ENABLED=true
    volumes:
      - /usr/me/contacts/db:/app/data
      - /usr/me/contacts/photos:/app/static/photos
    expose:
      - "8080"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  frontend:
    image: ghcr.io/fbuchner/meerkat-crm-frontend:latest
    container_name: meerkat-frontend
    restart: unless-stopped
    ports:
      - "7300:8080"
    depends_on:
      backend:
        condition: service_healthy
